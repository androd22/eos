name: Symfony
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  symfony-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, gd
          coverage: xdebug

      - uses: actions/checkout@v4

      - name: Copy .env.test
        run: php -r "file_exists('.env.test') || copy('.env.test.dist', '.env.test');"

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Start containers
        run: docker compose -f compose.test.yml up -d

      - name: Wait for MySQL
        run: |
          while ! docker compose exec -T db mysqladmin ping -h"localhost" --silent; do
            sleep 1
          done

      - name: Create Database
        run: |
          docker compose exec -T php bin/console doctrine:database:create --env=test --if-not-exists
          docker compose exec -T php bin/console doctrine:schema:create --env=test
          docker compose exec -T php bin/console doctrine:fixtures:load --env=test --no-interaction

      - name: Execute tests
        run: |
          docker compose exec -T php php -d xdebug.mode=coverage bin/phpunit --testsuite Unit
          docker compose exec -T php php -d xdebug.mode=coverage bin/phpunit --testsuite Repository

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Clean up
        if: always()
        run: docker compose down -v