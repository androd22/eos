name: Symfony

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  symfony-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, gd
          coverage: xdebug

      - uses: actions/checkout@v4

      - name: Copy .env.test
        run: php -r "file_exists('.env.test') || copy('.env.test.dist', '.env.test');"

      - name: Debug directory structure and files
        run: |
          echo "Current working directory:"
          pwd
          echo "\nListing current directory:"
          ls -la
          echo "\nChecking for compose.test.yaml:"
          if [ -f "compose.test.yaml" ]; then
            echo "compose.test.yaml exists"
            cat compose.test.yaml
          else
            echo "compose.test.yaml does not exist"
          fi
          echo "\nChecking for docker-compose.yml:"
          if [ -f "docker-compose.yml" ]; then
            echo "docker-compose.yml exists"
          else
            echo "docker-compose.yml does not exist"
          fi

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Start containers and show docker info
        run: |
          echo "Docker version:"
          docker --version
          echo "\nDocker Compose version:"
          docker compose version
          echo "\nStarting containers..."
          docker compose -f compose.test.yaml up -d
          echo "\nListing running containers:"
          docker compose -f compose.test.yaml ps
          echo "\nChecking container logs:"
          docker compose -f compose.test.yaml logs

      - name: Wait for PHP container to be ready
        run: |
          echo "Waiting for PHP container..."
          timeout=60
          until docker compose -f compose.test.yaml exec -T php true; do
            echo "Still waiting... ($timeout seconds remaining)"
            sleep 5
            timeout=$((timeout-5))
            if [ $timeout -le 0 ]; then
              echo "Timeout waiting for PHP container"
              exit 1
            fi
          done
          echo "PHP container is ready"

      - name: Show PHP container logs
        run: docker compose -f compose.test.yaml logs php

      - name: Install Composer dependencies in PHP container
        run: docker compose -f compose.test.yaml exec -T php composer install

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL..."
          timeout=60
          until docker compose -f compose.test.yaml exec -T db mysqladmin ping -h"localhost" --silent; do
            echo "Still waiting... ($timeout seconds remaining)"
            sleep 1
            timeout=$((timeout-1))
            if [ $timeout -le 0 ]; then
              echo "Timeout waiting for MySQL"
              exit 1
            fi
          done
          echo "MySQL is ready"

      - name: Create Database
        run: |
          docker compose -f compose.test.yaml exec -T php bin/console doctrine:database:create --env=test --if-not-exists
          docker compose -f compose.test.yaml exec -T php bin/console doctrine:schema:create --env=test
          docker compose -f compose.test.yaml exec -T php bin/console doctrine:fixtures:load --env=test --no-interaction

      - name: Execute tests
        run: |
          docker compose -f compose.test.yaml exec -T php php -d xdebug.mode=coverage bin/phpunit --testsuite Unit
          docker compose -f compose.test.yaml exec -T php php -d xdebug.mode=coverage bin/phpunit --testsuite Repository

      - name: Show logs on failure
        if: failure()
        run: docker compose -f compose.test.yaml logs

      - name: Clean up
        if: always()
        run: docker compose -f compose.test.yaml down -v